name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  # Reproducible, locked test run (the required gate).
  test:
    uses: ./.github/workflows/test.yml

  # Compatibility smoke test from a user's perspective: installs the latest
  # allowed dependencies and only checks that every figure builds without
  # error (image comparison is skipped via HEATMAPTS_SMOKE). Non-blocking, so
  # cosmetic rendering differences don't fail CI but real breakage surfaces.
  compat:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true

      - name: Install Latest Dependencies
        run: uv sync --upgrade

      - name: Run Smoke Tests
        env:
          HEATMAPTS_SMOKE: "1"
        run: uv run python -m unittest tests/tests.py
