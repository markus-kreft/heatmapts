name: Publish to PyPI

on:
  push:
    tags:
      - 'v*'

jobs:
  # Reproducible tests need to pass before publishing.
  test:
    uses: ./.github/workflows/test.yml

  publish:
    name: Build and publish Python distribution
    needs: test
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/heatmapts
    permissions:
      # Required for Trusted Publishing (OIDC)
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true

      - name: Verify tag matches package version
        run: |
          tag_version="${GITHUB_REF_NAME#v}"
          pkg_version="$(uv version --short)"
          if [ "$tag_version" != "$pkg_version" ]; then
            echo "::error::Tag '$GITHUB_REF_NAME' (version '$tag_version') does not match pyproject version '$pkg_version'"
            exit 1
          fi
          echo "Tag matches package version: $pkg_version"

      - name: Build package
        run: uv build

      - name: Publish to PyPI
        run: uv publish
