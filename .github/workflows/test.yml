name: Test

# Reusable, reproducible test run: uses the locked dependencies so the
# pixel-exact image comparisons match the committed baselines. Called by both
# CI (as the required gate) and the release workflow (before publishing).
on:
  workflow_call:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true

      - name: Install Locked Dependencies
        run: uv sync --locked

      - name: Run Ruff Check
        run: uvx ruff check

      - name: Run Ruff Format Check
        run: uvx ruff format --check

      - name: Run Ty Type Check
        run: uvx ty check

      - name: Run Tests
        run: uv run python -m unittest tests/tests.py
